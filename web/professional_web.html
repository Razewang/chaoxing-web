<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习通助手 - 专业版</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #333; 
            text-align: center; 
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 600;
        }
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }
        .panel {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .panel h3 {
            margin-top: 0;
            color: #495057;
            font-size: 1.3em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; transform: translateY(-2px); }
        .btn-success { background: #48bb78; color: white; }
        .btn-success:hover { background: #38a169; }
        .btn-danger { background: #f56565; color: white; }
        .btn-danger:hover { background: #e53e3e; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-warning { background: #ed8936; color: white; }
        .btn-info { background: #4299e1; color: white; }
        .btn:disabled { background: #e9ecef; color: #6c757d; cursor: not-allowed; }
        .terminal { 
            background: #1a1a1a; 
            color: #00ff00; 
            padding: 20px; 
            border-radius: 8px; 
            font-family: 'Consolas', 'Monaco', monospace; 
            height: 400px; 
            overflow-y: auto; 
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .status.running { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.stopped { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .course-item {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .course-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .course-item.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .course-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .course-id {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 10px;
        }
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: #48bb78;
            transition: width 0.3s;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .config-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 8px 16px;
            background: #e9ecef;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
    }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-graduation-cap"></i> 学习通助手 - 专业版</h1>
        
        <div id="status" class="status stopped">
            <i class="fas fa-circle"></i>
            <span>未运行</span>
        </div>
        
        <div class="main-content">
            <!-- 左侧面板 -->
            <div class="panel">
                <h3><i class="fas fa-cog"></i> 控制面板</h3>
                
                <div class="config-tabs">
                    <button class="tab active" onclick="switchTab('control')">控制</button>
                    <button class="tab" onclick="switchTab('courses')">课程</button>
                    <button class="tab" onclick="switchTab('config')">配置</button>
                </div>
                
                <!-- 控制标签页 -->
                <div id="control-tab" class="tab-content active">
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button id="startBtn" class="btn btn-success" onclick="startProgram()">
                            <i class="fas fa-play"></i> 启动程序
                        </button>
                        <button id="stopBtn" class="btn btn-danger" onclick="stopProgram()" disabled>
                            <i class="fas fa-stop"></i> 停止程序
                        </button>
                        <button class="btn btn-info" onclick="getCourses()">
                            <i class="fas fa-list"></i> 获取课程列表
                        </button>
                        <button class="btn btn-warning" onclick="startSelectedCourses()">
                            <i class="fas fa-rocket"></i> 运行选中课程
                        </button>
                    </div>
                    
                    <div style="margin-top: 20px;">
                        <h4>快速命令</h4>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
                            <button class="btn btn-secondary" style="padding: 8px; font-size: 12px;" onclick="sendCommand('1')">登录</button>
                            <button class="btn btn-secondary" style="padding: 8px; font-size: 12px;" onclick="sendCommand('2')">课程</button>
                            <button class="btn btn-secondary" style="padding: 8px; font-size: 12px;" onclick="sendCommand('3')">进度</button>
                            <button class="btn btn-secondary" style="padding: 8px; font-size: 12px;" onclick="sendCommand('4')">状态</button>
                        </div>
                    </div>
                </div>
                
                <!-- 课程标签页 -->
                <div id="courses-tab" class="tab-content">
                    <div id="courseList" style="max-height: 400px; overflow-y: auto;">
                        <div style="text-align: center; color: #6c757d; padding: 40px;">
                            <i class="fas fa-book" style="font-size: 48px; margin-bottom: 10px;"></i>
                            <p>点击"获取课程列表"加载</p>
                        </div>
                    </div>
                    <div style="margin-top: 15px; text-align: center;">
                        <small>已选择: <span id="selectedCount">0</span> 门课程</small>
                    </div>
                </div>
                
                <!-- 配置标签页 -->
                <div id="config-tab" class="tab-content">
                    <div class="form-group">
                        <label>播放倍速</label>
                        <select id="speed">
                            <option value="1">1.0x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2" selected>2.0x</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>未开放章节处理</label>
                        <select id="notopen_action">
                            <option value="retry">重试</option>
                            <option value="continue" selected>跳过</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="saveConfig()">
                        <i class="fas fa-save"></i> 保存配置
                    </button>
                </div>
            </div>
            
            <!-- 右侧终端 -->
            <div class="panel">
                <h3><i class="fas fa-terminal"></i> 终端输出</h3>
                <div id="terminal" class="terminal">等待程序启动...</div>
                <div style="margin-top: 15px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="commandInput" placeholder="输入命令..." disabled style="flex: 1;">
                        <button class="btn btn-primary" onclick="sendCommandFromInput()" disabled id="sendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let statusCheckInterval;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            startStatusCheck();
            
            // 回车发送命令
            document.getElementById('commandInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendCommandFromInput();
                }
            });
        });
        
        function startStatusCheck() {
            // 定期检查状态
            statusCheckInterval = setInterval(() => {
                fetch('/api/status')
                    .then(response => response.json())
                    .then(data => {
                        updateUI(data);
                    })
                    .catch(error => {
                        console.error('获取状态失败:', error);
                    });
            }, 1000);
        }
        
        function updateUI(data) {
            // 更新运行状态
            updateStatus(data.running);
            
            // 更新终端输出
            if (data.output && data.output.length > 0) {
                const terminal = document.getElementById('terminal');
                terminal.textContent = data.output.join('\n');
                terminal.scrollTop = terminal.scrollHeight;
            }
            
            // 更新课程列表
            if (data.courses && data.courses.length > 0) {
                updateCourseList(data.courses, data.selected_courses);
            }
        }
        
        function updateStatus(running) {
            const status = document.getElementById('status');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const input = document.getElementById('commandInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (running) {
                status.innerHTML = '<i class="fas fa-circle"></i><span>运行中</span>';
                status.className = 'status running';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                input.disabled = false;
                sendBtn.disabled = false;
            } else {
                status.innerHTML = '<i class="fas fa-circle"></i><span>未运行</span>';
                status.className = 'status stopped';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                input.disabled = true;
                sendBtn.disabled = true;
            }
        }
        
        function updateCourseList(courses, selected) {
            const courseList = document.getElementById('courseList');
            courseList.innerHTML = courses.map(course => `
                <div class="course-item ${selected.includes(course.id) ? 'selected' : ''}" 
                     onclick="toggleCourse('${course.id}')">
                    <div class="course-title">${course.name}</div>
                    <div class="course-id">ID: ${course.id}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${course.progress}%"></div>
                    </div>
                    <small>${course.progress}% ${course.completed ? '✅' : ''}</small>
                </div>
            `).join('');
            
            document.getElementById('selectedCount').textContent = selected.length;
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }
        
        async function startProgram() {
            try {
                const response = await fetch('/api/start', { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    console.log('程序启动成功');
                } else {
                    alert('启动失败: ' + result.error);
                }
            } catch (error) {
                alert('启动失败: ' + error.message);
            }
        }
        
        async function stopProgram() {
            try {
                const response = await fetch('/api/stop', { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    console.log('程序已停止');
                }
            } catch (error) {
                console.error('停止失败:', error);
            }
        }
        
        async function sendCommand(command) {
            try {
                const response = await fetch('/api/input', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: command })
                });
                const result = await response.json();
                if (!result.success) {
                    console.error('发送失败:', result.error);
                }
            } catch (error) {
                console.error('发送失败:', error);
            }
        }
        
        function sendCommandFromInput() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();
            if (command) {
                sendCommand(command);
                input.value = '';
            }
        }
        
        function getCourses() {
            if (!document.getElementById('startBtn').disabled) {
                alert('请先启动程序');
                return;
            }
            sendCommand('2');
        }
        
        function toggleCourse(courseId) {
            const selected = new Set(JSON.parse(localStorage.getItem('selectedCourses') || '[]'));
            if (selected.has(courseId)) {
                selected.delete(courseId);
            } else {
                selected.add(courseId);
            }
            localStorage.setItem('selectedCourses', JSON.stringify([...selected]));
            
            // 更新UI
            document.querySelectorAll('.course-item').forEach(item => {
                if (item.onclick.toString().includes(courseId)) {
                    item.classList.toggle('selected');
                }
            });
            
            document.getElementById('selectedCount').textContent = selected.size;
        }
        
        async function startSelectedCourses() {
            const selected = JSON.parse(localStorage.getItem('selectedCourses') || '[]');
            if (selected.length === 0) {
                alert('请先选择课程');
                return;
            }
            
            try {
                const response = await fetch('/api/select_courses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courses: selected })
                });
                const result = await response.json();
                if (result.success) {
                    console.log('已选择课程:', selected.join(','));
                }
            } catch (error) {
                console.error('选择课程失败:', error);
            }
        }
        
        function saveConfig() {
            // 这里可以添加保存配置的逻辑
            alert('配置已保存（演示版本）');
        }
        
        // 页面关闭时清理
        window.addEventListener('beforeunload', () => {
            if (statusCheckInterval) {
                clearInterval(statusCheckInterval);
            }
        });
    </script>
</body>
</html>
