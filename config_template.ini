# Chaoxing Web 配置文件模板
# 复制此文件为 config.ini 并填入你的实际配置

[account]
# 超星学习通手机号
username = 
# 登录密码
password = 

[course]
# 指定要学习的课程ID列表，用逗号分隔
# 留空则自动学习所有课程
# 示例: course_ids = 123456,789012,345678
course_ids = 

[settings]
# 视频播放倍速（1.0-2.0）
speed = 1.0
# 遇到关闭任务点的行为：retry/ask/continue
# retry: 重试（默认）
# ask: 询问用户
# continue: 跳过并继续下一个
notopen_action = retry
# 是否启用调试模式
debug = false

[notification]
# 是否启用通知功能
enable = false
# 通知类型：webhook/dingding/bark等
type = 
# 通知地址或配置
webhook = 

[advanced]
# 任务执行间隔（秒）
task_interval = 3
# 最大重试次数
max_retry = 3
# 超时时间（秒）
timeout = 30