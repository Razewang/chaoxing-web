<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习通助手 - Web控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-graduation-cap"></i> 学习通助手
            </span>
            <div class="d-flex">
                <span class="navbar-text me-3">
                    <span id="status-indicator" class="status-indicator">
                        <i class="fas fa-circle text-danger"></i> 未运行
                    </span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- 配置面板 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-cog"></i> 配置设置
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="config-form">
                            <!-- 基本配置 -->
                            <h6 class="mt-3 mb-3">基本设置</h6>
                            <div class="mb-3">
                                <label for="username" class="form-label">手机号</label>
                                <input type="text" class="form-control" id="username" name="username" placeholder="请输入手机号">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码">
                            </div>
                            <div class="mb-3">
                                <label for="course_list" class="form-label">课程ID列表</label>
                                <input type="text" class="form-control" id="course_list" name="course_list" placeholder="多个课程用逗号分隔">
                                <div class="form-text">留空运行所有课程</div>
                            </div>
                            <div class="mb-3">
                                <label for="speed" class="form-label">播放倍速</label>
                                <select class="form-select" id="speed" name="speed">
                                    <option value="1">1.0x</option>
                                    <option value="1.25">1.25x</option>
                                    <option value="1.5">1.5x</option>
                                    <option value="1.75">1.75x</option>
                                    <option value="2" selected>2.0x</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="notopen_action" class="form-label">未开放章节处理</label>
                                <select class="form-select" id="notopen_action" name="notopen_action">
                                    <option value="retry">重试</option>
                                    <option value="ask">询问</option>
                                    <option value="continue" selected>跳过</option>
                                </select>
                            </div>

                            <!-- 题库配置 -->
                            <h6 class="mt-4 mb-3">题库设置</h6>
                            <div class="mb-3">
                                <label for="tiku_provider" class="form-label">题库提供商</label>
                                <select class="form-select" id="tiku_provider" name="tiku_provider">
                                    <option value="TikuYanxi">言溪题库</option>
                                    <option value="TikuLike">LIKE知识库</option>
                                    <option value="TikuAdapter">TikuAdapter</option>
                                    <option value="AI">AI题库</option>
                                    <option value="SiliconFlow">SiliconFlow</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="tiku_submit" class="form-label">自动提交</label>
                                <select class="form-select" id="tiku_submit" name="tiku_submit">
                                    <option value="true">是</option>
                                    <option value="false">否</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="tiku_tokens" class="form-label">题库Token</label>
                                <input type="text" class="form-control" id="tiku_tokens" name="tiku_tokens" placeholder="请输入token">
                            </div>

                            <!-- 通知配置 -->
                            <h6 class="mt-4 mb-3">通知设置</h6>
                            <div class="mb-3">
                                <label for="notification_provider" class="form-label">通知服务</label>
                                <select class="form-select" id="notification_provider" name="notification_provider">
                                    <option value="">关闭通知</option>
                                    <option value="ServerChan">ServerChan</option>
                                    <option value="Qmsg">Qmsg</option>
                                    <option value="Bark">Bark</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="notification_url" class="form-label">通知URL</label>
                                <input type="text" class="form-control" id="notification_url" name="notification_url" placeholder="请输入通知服务的URL">
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> 保存配置
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 控制台输出 -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-terminal"></i> 控制台输出
                        </h5>
                        <div>
                            <button id="start-btn" class="btn btn-success btn-sm me-2" disabled>
                                <i class="fas fa-play"></i> 启动
                            </button>
                            <button id="stop-btn" class="btn btn-danger btn-sm" disabled>
                                <i class="fas fa-stop"></i> 停止
                            </button>
                            <button id="clear-btn" class="btn btn-secondary btn-sm ms-2">
                                <i class="fas fa-eraser"></i> 清空
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="terminal" class="terminal-container"></div>
                    </div>
                    <div class="card-footer">
                        <div class="input-group">
                            <input type="text" id="terminal-input" class="form-control" placeholder="输入命令..." disabled>
                            <button class="btn btn-outline-secondary" type="button" id="send-btn" disabled>
                                <i class="fas fa-paper-plane"></i> 发送
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 快捷操作 -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h6 class="card-title mb-0">
                            <i class="fas fa-bolt"></i> 快捷操作
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-6">
                                <button class="btn btn-outline-primary w-100 quick-action" data-action="login">
                                    <i class="fas fa-sign-in-alt"></i> 快速登录
                                </button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-info w-100 quick-action" data-action="courses">
                                    <i class="fas fa-list"></i> 查看课程
                                </button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-warning w-100 quick-action" data-action="progress">
                                    <i class="fas fa-chart-line"></i> 查看进度
                                </button>
                            </div>
                            <div class="col-6">
                                <button class="btn btn-outline-success w-100 quick-action" data-action="status">
                                    <i class="fas fa-info-circle"></i> 系统状态
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.3.0/xterm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
